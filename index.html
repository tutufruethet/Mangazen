<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MANGAZEN</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0a0a0f;--ink2:#0f0f1a;--ink3:#1a1a2e;--ink4:#2a2a3e;--red:#c0392b;--red2:#e74c3c;--paper:#f5f0e8;--dim:#8a8a9a}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--ink);color:var(--paper);font-family:'Inter',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.header{background:var(--ink);border-bottom:2px solid var(--red);height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;flex-shrink:0}
.logo{font-weight:900;font-size:1.1rem;letter-spacing:.06em;display:flex;align-items:center;gap:.25rem}
.logo span{color:var(--red)}
.logo small{font-family:'Space Mono',monospace;font-size:.5rem;color:var(--dim);letter-spacing:.15em;margin-left:.3rem}
.badge{background:var(--red);color:#fff;font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:.12em;padding:3px 7px;font-weight:700}
.badge.on{background:#1a5e2e}
.body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tab{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab.active{display:block}
.form{padding:1rem;display:flex;flex-direction:column;gap:1.25rem;padding-bottom:2rem}
.sec{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem}
.sec span{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.22em;color:var(--red);text-transform:uppercase;white-space:nowrap}
.sec::after{content:'';flex:1;height:1px;background:var(--ink4)}
label{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.06em;color:var(--dim);margin-bottom:.35rem;display:block}
input,textarea{width:100%;background:var(--ink3);border:1px solid var(--ink4);color:var(--paper);font-family:'Inter',sans-serif;font-size:16px;padding:.6rem .7rem;outline:none;border-radius:0;-webkit-appearance:none}
textarea{resize:none;line-height:1.5}
input:focus,textarea:focus{border-color:var(--red)}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.4rem}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem}
.chip{background:var(--ink3);border:1px solid var(--ink4);color:var(--dim);font-family:'Space Mono',monospace;font-size:.65rem;padding:.55rem .25rem;cursor:pointer;text-align:center}
.chip.active{background:var(--red);border-color:var(--red);color:#fff}
.lay{background:var(--ink3);border:2px solid var(--ink4);cursor:pointer;padding:6px;aspect-ratio:.62;display:flex;flex-direction:column;gap:4px;align-items:center}
.lay.active{background:#1a0808;border-color:var(--red)}
.lay .name{font-family:'Space Mono',monospace;font-size:.42rem;letter-spacing:.08em;color:var(--dim)}
.lay.active .name{color:var(--red)}
.thumb{flex:1;width:100%;display:flex;flex-direction:column;gap:2px}
.thumb .r{display:flex;gap:2px;flex:1}
.thumb b{background:var(--ink4);border-radius:1px;display:block;flex:1}
.btn{width:100%;background:var(--red);color:#fff;border:none;padding:.85rem 1rem;font-weight:700;font-size:.95rem;letter-spacing:.06em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem}
.btn:disabled{background:#7a2020;cursor:not-allowed}
.genbar{padding:.6rem 1rem;background:var(--ink);border-top:1px solid var(--ink4);flex-shrink:0}
.err{background:#1a0808;border:1px solid var(--red);color:#ff6b6b;padding:.6rem .75rem;font-family:'Space Mono',monospace;font-size:.68rem;line-height:1.4}
.nav{display:flex;background:var(--ink2);border-top:1px solid var(--ink4);flex-shrink:0}
.nav button{flex:1;background:none;border:none;border-top:2px solid transparent;color:var(--dim);font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.1em;padding:10px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav button.active{color:var(--paper);border-top-color:var(--red)}
.nav button .i{font-size:1.1rem}
.preview-top{background:var(--ink2);border-bottom:1px solid var(--ink4);padding:.55rem 1rem;display:flex;gap:.5rem;align-items:center;flex-shrink:0}
.preview-top .stat{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--dim);letter-spacing:.1em;flex:1}
.preview-top .stat.busy{color:var(--red)}
.sbtn{background:var(--ink3);border:1px solid var(--ink4);color:var(--dim);font-family:'Space Mono',monospace;font-size:.58rem;padding:.35rem .6rem;cursor:pointer}
.canvas{flex:1;overflow-y:auto;padding:1rem;background:#050508;-webkit-overflow-scrolling:touch}
.page{background:#f5f0e8;border:3px solid #0a0a0f;width:100%;max-width:560px;margin:0 auto;box-shadow:0 8px 40px rgba(192,57,43,.2),0 20px 80px rgba(0,0,0,.8)}
.page-head{background:#0a0a0f;border-bottom:4px solid #c0392b;padding:.8rem 1rem .6rem;display:flex;align-items:flex-end;justify-content:space-between}
.page-title{font-weight:900;font-size:1.4rem;color:#f5f0e8;letter-spacing:.04em;line-height:1}
.page-title.empty{font-size:.8rem;color:#5a5a7a;font-style:italic}
.page-chap{font-family:'Space Mono',monospace;font-size:.55rem;color:#c0392b;letter-spacing:.18em;white-space:nowrap}
.panels{padding:10px;display:flex;flex-direction:column;gap:8px}
.prow{display:flex;gap:8px}
.panel{flex:1;background:#1a1612;border:3px solid #0a0a0f;position:relative;overflow:hidden;display:flex;flex-direction:column}
.p-narr{background:#e0d8c8;border-bottom:2px solid #0a0a0f;padding:.3rem .5rem;font-size:.6rem;font-style:italic;color:#0a0a0f;line-height:1.3}
.p-img{flex:1;position:relative;display:flex;align-items:center;justify-content:center;min-height:0}
.p-img img{width:100%;height:100%;object-fit:cover;display:block}
.p-load{color:var(--dim);font-size:.6rem;font-family:'Space Mono',monospace;display:flex;flex-direction:column;align-items:center;gap:8px}
.p-err{color:#ff8080;font-size:.6rem;padding:1rem;text-align:center;font-family:'Space Mono',monospace;line-height:1.4}
.p-dlg{background:#fff;border-top:2.5px solid #0a0a0f;padding:.4rem .6rem;font-size:.64rem;font-weight:700;color:#0a0a0f;line-height:1.35}
.p-dlg b{color:var(--red)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:500px;opacity:.2;color:#0a0a0f;gap:.5rem}
.empty .k{font-weight:900;font-size:3rem}
.empty .t{font-family:'Space Mono',monospace;font-size:.6rem;text-align:center;line-height:1.6}
.chat{flex:1;display:flex;flex-direction:column;min-height:0}
.chat-msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem;-webkit-overflow-scrolling:touch}
.msg{display:flex;gap:.5rem;align-items:flex-end}
.msg.user{flex-direction:row-reverse}
.msg .av{width:28px;height:28px;flex-shrink:0;background:var(--ink3);border:1px solid var(--ink4);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#fff;font-weight:700}
.msg.user .av{background:var(--red);border-color:var(--red);font-size:.55rem}
.msg .bub{background:var(--ink2);border:1px solid var(--ink4);padding:.5rem .7rem;font-size:.8rem;line-height:1.5;color:var(--paper);max-width:calc(100% - 44px);white-space:pre-wrap}
.msg.user .bub{background:#180808;border-color:#3a1010}
.chat-in{background:var(--ink2);border-top:1px solid var(--ink4);padding:.7rem;display:flex;gap:.5rem;align-items:flex-end;flex-shrink:0}
.chat-in textarea{flex:1;min-height:38px;max-height:100px}
.send{background:var(--red);border:none;color:#fff;width:40px;height:40px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes td{0%,60%,100%{opacity:.2;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
.spin{animation:spin .9s linear infinite;display:inline-block}
.dot{width:6px;height:6px;border-radius:50%;background:var(--dim)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#0a0a0f}::-webkit-scrollbar-thumb{background:#2a2a3e}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">MANGA<span>ZEN</span><small>漫画</small></div>
    <div class="badge on" id="badge">● ONLINE</div>
  </div>

  <div class="body">
    <!-- CRIAR -->
    <div class="tab active" id="tab-criar">
      <div class="form">
        <div>
          <div class="sec"><span>Título</span></div>
          <input id="title" placeholder="Ex: SHIN NO YORU" maxlength="50" style="font-weight:700;background:var(--ink2)">
        </div>
        <div>
          <div class="sec"><span>Capítulo</span></div>
          <div style="display:flex;gap:.6rem">
            <div style="width:70px"><label>Nº</label><input id="chapNum" value="1" maxlength="4"></div>
            <div style="flex:1"><label>Nome (opcional)</label><input id="chapName" placeholder="O Despertar"></div>
          </div>
        </div>
        <div>
          <div class="sec"><span>Estilo</span></div>
          <div class="grid3" id="styles"></div>
        </div>
        <div>
          <div class="sec"><span>Layout</span></div>
          <div class="grid4" id="layouts"></div>
        </div>
        <div>
          <div class="sec"><span>Personagens</span></div>
          <textarea id="chars" rows="3" placeholder="Ex: Ryu — guerreiro de cabelos brancos. Tiger — filhote de tigre..."></textarea>
        </div>
        <div>
          <div class="sec"><span>Cenário</span></div>
          <textarea id="scenario" rows="2" placeholder="Ex: Floresta sombria sob chuva, relâmpagos ao fundo..."></textarea>
        </div>
        <div>
          <div class="sec"><span>A Cena</span></div>
          <textarea id="scene" rows="5" placeholder="Ex: Ryu encontra o tigre ferido. Ele se aproxima devagar, estende a mão..."></textarea>
        </div>
        <div class="err" id="err" style="display:none"></div>
      </div>
    </div>

    <!-- PAGINA -->
    <div class="tab" id="tab-pagina" style="display:none">
      <div style="display:flex;flex-direction:column;height:100%">
        <div class="preview-top">
          <span class="stat" id="stat">PRÉVIA</span>
          <button class="sbtn" id="btnClear">✕ Limpar</button>
        </div>
        <div class="canvas">
          <div class="page">
            <div class="page-head">
              <div class="page-title empty" id="pTitle">Sem título</div>
              <div class="page-chap" id="pChap">CAP. 1</div>
            </div>
            <div class="panels" id="panels">
              <div class="empty"><div class="k">漫</div><div class="t">Gere uma página<br>na aba CRIAR</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- CHAT -->
    <div class="tab" id="tab-chat" style="display:none">
      <div class="chat">
        <div class="chat-msgs" id="msgs">
          <div class="msg"><div class="av">鬼</div><div class="bub">Olá! Sou seu assistente de mangá. Posso ajudar a criar personagens, diálogos e reviravoltas. O que vamos desenvolver?</div></div>
        </div>
        <div class="chat-in">
          <textarea id="chatIn" rows="1" placeholder="Pergunte sobre sua história..."></textarea>
          <button class="send" id="chatSend">➤</button>
        </div>
      </div>
    </div>
  </div>

  <div class="genbar" id="genbar">
    <button class="btn" id="btnGen">⚡ CRIAR PÁGINA</button>
  </div>

  <div class="nav">
    <button class="active" data-tab="criar"><span class="i">✏️</span>CRIAR</button>
    <button data-tab="pagina"><span class="i">📖</span>PÁGINA</button>
    <button data-tab="chat"><span class="i">🤖</span>IA</button>
  </div>
</div>

<script>
const STYLES={shonen:{label:"Shōnen",p:"dynamic shonen manga style, bold ink lines, dramatic action, high energy"},seinen:{label:"Seinen",p:"realistic seinen manga style, heavy detailed shading, cinematic, mature dark tone"},josei:{label:"Josei",p:"elegant josei manga style, expressive detailed eyes, soft delicate atmosphere"},horror:{label:"Horror",p:"horror manga style, distorted shadows, unsettling perspective, eerie macabre"},fantasy:{label:"Fantasy",p:"epic fantasy manga style, magical elements, grand mystical scenery"},cyberpunk:{label:"Cyberpunk",p:"cyberpunk manga style, neon glow in darkness, technological, noir"}};
const LAYOUTS=[{id:"classic",label:"CLÁSSICO",n:3},{id:"action",label:"AÇÃO",n:4},{id:"drama",label:"DRAMA",n:3},{id:"splash",label:"SPLASH",n:3}];
let style="shonen",layout="classic",panels=[],generating=false,chatHist=[];

// montar estilos
const $styles=document.getElementById("styles");
Object.entries(STYLES).forEach(([k,v])=>{const b=document.createElement("button");b.className="chip"+(k===style?" active":"");b.textContent=v.label;b.onclick=()=>{style=k;[...$styles.children].forEach(c=>c.classList.remove("active"));b.classList.add("active")};$styles.appendChild(b)});

// montar layouts
const thumbs={classic:'<b style="flex:2"></b><div class="r"><b></b><b></b></div>',action:'<div class="r"><b></b><b></b></div><div class="r"><b></b><b></b></div>',drama:'<b></b><b style="flex:3"></b><b></b>',splash:'<b style="flex:3"></b><div class="r"><b></b><b></b></div>'};
const $layouts=document.getElementById("layouts");
LAYOUTS.forEach(l=>{const b=document.createElement("button");b.className="lay"+(l.id===layout?" active":"");b.innerHTML='<div class="thumb">'+thumbs[l.id]+'</div><div class="name">'+l.label+'</div>';b.onclick=()=>{layout=l.id;[...$layouts.children].forEach(c=>c.classList.remove("active"));b.classList.add("active")};$layouts.appendChild(b)});

// tabs
function setTab(t){document.querySelectorAll(".tab").forEach(x=>{x.classList.remove("active");x.style.display="none"});const el=document.getElementById("tab-"+t);el.classList.add("active");el.style.display=t==="criar"?"block":"flex";document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));document.getElementById("genbar").style.display=t==="criar"?"block":"none"}
document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>setTab(b.dataset.tab));

// title/chapter sync
const v=id=>document.getElementById(id).value;
document.getElementById("title").oninput=e=>{const t=document.getElementById("pTitle");if(e.target.value.trim()){t.textContent=e.target.value.toUpperCase();t.classList.remove("empty")}else{t.textContent="Sem título";t.classList.add("empty")}};
function syncChap(){const n=v("chapNum")||"1",nm=v("chapName").trim();document.getElementById("pChap").textContent=nm?`CAP. ${n} — ${nm.toUpperCase()}`:`CAP. ${n}`}
document.getElementById("chapNum").oninput=syncChap;document.getElementById("chapName").oninput=syncChap;

function showErr(m){const e=document.getElementById("err");e.textContent="⚠ "+m;e.style.display="block"}
function hideErr(){document.getElementById("err").style.display="none"}

function parseJSON(raw){const c=raw.replace(/```json|```/g,"").trim();try{return JSON.parse(c)}catch(e){const m=c.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0]);throw new Error("Resposta inválida")}}

async function callScript(messages,system,max){const r=await fetch("/api/script",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages,system,max_tokens:max})});const d=await r.json();if(!r.ok)throw new Error(d.error||"erro");return d.text}
async function callImage(prompt){const r=await fetch("/api/image",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt})});const d=await r.json();if(!r.ok)throw new Error(d.error||"erro");return d.image}

// render panels
function renderPanels(){
  const cont=document.getElementById("panels");
  if(!panels.length){cont.innerHTML='<div class="empty"><div class="k">漫</div><div class="t">Gere uma página<br>na aba CRIAR</div></div>';return}
  const panelHTML=(p,h)=>{
    let inner="";
    if(p.narration)inner+=`<div class="p-narr">${p.narration}</div>`;
    inner+=`<div class="p-img">`;
    if(p.image)inner+=`<img src="${p.image}">`;
    else if(p.error)inner+=`<div class="p-err">⚠ ${p.error}</div>`;
    else inner+=`<div class="p-load"><span class="spin" style="font-size:1.2rem">↻</span>desenhando...</div>`;
    inner+=`</div>`;
    if(p.dialogue)inner+=`<div class="p-dlg"><b>▸ </b>${p.dialogue}</div>`;
    return `<div class="panel" style="min-height:${h}px">${inner}</div>`;
  };
  const row=(a,h)=>`<div class="prow">${a.filter(x=>x).map(p=>panelHTML(p,h)).join("")}</div>`;
  let html="";
  if(layout==="classic"){if(panels[0])html+=panelHTML(panels[0],320);html+=row([panels[1],panels[2]],220)}
  else if(layout==="action"){html+=row([panels[0],panels[1]],200)+row([panels[2],panels[3]],200)}
  else if(layout==="drama"){if(panels[0])html+=panelHTML(panels[0],200);if(panels[1])html+=panelHTML(panels[1],360);if(panels[2])html+=panelHTML(panels[2],200)}
  else{if(panels[0])html+=panelHTML(panels[0],440);html+=row([panels[1],panels[2]],200)}
  cont.innerHTML=html;
}

function setStat(s,busy){const e=document.getElementById("stat");e.textContent=s;e.classList.toggle("busy",!!busy)}

// gerar
document.getElementById("btnGen").onclick=async()=>{
  if(generating)return;
  const scene=v("scene").trim();
  if(!scene){showErr("Descreva o que acontece na cena!");return}
  hideErr();generating=true;
  const btn=document.getElementById("btnGen");btn.disabled=true;btn.innerHTML='<span class="spin">↻</span> CRIANDO...';
  const num=LAYOUTS.find(l=>l.id===layout).n;
  try{
    setTab("pagina");setStat("Montando o roteiro...",true);
    const planPrompt=`Você é um roteirista de mangá. Divida esta cena em ${num} painéis.

PERSONAGENS: ${v("chars")||"não especificados"}
CENÁRIO: ${v("scenario")||"não especificado"}
CENA: ${scene}

Retorne APENAS JSON válido (sem backticks):
{"panels":[{"visual":"descrição visual em INGLÊS, detalhada, do que se vê (personagens, pose, expressão, ângulo de câmera, ambiente)","dialogue":"fala em português OU null","narration":"narração curta em português OU null (máx 1 painel)"}]}
Varie ângulos entre painéis.`;
    const raw=await callScript([{role:"user",content:planPrompt}]);
    const plan=parseJSON(raw);
    const pp=(plan.panels||[]).slice(0,num);
    panels=pp.map(p=>({dialogue:p.dialogue,narration:p.narration,image:null}));
    renderPanels();
    for(let i=0;i<pp.length;i++){
      setStat(`Desenhando painel ${i+1} de ${pp.length}...`,true);
      const prompt=`${STYLES[style].p}. Black and white manga panel, ink illustration, no text, no speech bubbles, no words. Scene: ${pp[i].visual}`;
      try{panels[i].image=await callImage(prompt)}catch(e){panels[i].error=e.message}
      renderPanels();
    }
    setStat("PRÉVIA",false);
  }catch(e){setStat("PRÉVIA",false);setTab("criar");showErr(e.message)}
  finally{generating=false;btn.disabled=false;btn.innerHTML="⚡ CRIAR PÁGINA"}
};

document.getElementById("btnClear").onclick=()=>{panels=[];renderPanels()};

// chat
function addMsg(role,text){const c=document.getElementById("msgs");const d=document.createElement("div");d.className="msg"+(role==="user"?" user":"");d.innerHTML=`<div class="av">${role==="user"?"EU":"鬼"}</div><div class="bub">${text.replace(/</g,"&lt;")}</div>`;c.appendChild(d);c.scrollTop=c.scrollHeight}
async function sendChat(){
  const inp=document.getElementById("chatIn");const msg=inp.value.trim();if(!msg)return;
  inp.value="";inp.style.height="38px";addMsg("user",msg);chatHist.push({role:"user",content:msg});
  const c=document.getElementById("msgs");const t=document.createElement("div");t.className="msg";t.innerHTML='<div class="av">鬼</div><div class="bub" style="display:flex;gap:4px"><span class="dot" style="animation:td 1.2s infinite"></span><span class="dot" style="animation:td 1.2s .2s infinite"></span><span class="dot" style="animation:td 1.2s .4s infinite"></span></div>';c.appendChild(t);c.scrollTop=c.scrollHeight;
  const sys=`Você é um assistente especialista em criação de mangás e narrativa visual japonesa. Mangá: "${v("title")||"sem título"}" | Personagens: "${v("chars")}" | Cena: "${v("scene")}". Responda em português brasileiro, criativo e conciso (máx 3 parágrafos curtos).`;
  try{const reply=await callScript(chatHist,sys,600);t.remove();addMsg("ai",reply);chatHist.push({role:"assistant",content:reply})}
  catch(e){t.remove();addMsg("ai","Tive um problema. Tente de novo!")}
}
document.getElementById("chatSend").onclick=sendChat;
document.getElementById("chatIn").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat()}});
document.getElementById("chatIn").addEventListener("input",function(){this.style.height="38px";this.style.height=Math.min(this.scrollHeight,100)+"px"});
</script>
</body>
</html>
